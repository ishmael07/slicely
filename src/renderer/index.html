<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' https: data:; style-src 'self' 'unsafe-inline'; script-src 'self';"
    />
    <title>Slicely</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <!-- Draggable title strip (frameless window) -->
      <header id="titlebar">
        <div class="brand">
          <span class="logo">◆</span>
          <span class="name">Slicely</span>
        </div>
        <div class="title-right">
          <div class="status" id="slicerStatus" title="PrusaSlicer status">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">checking…</span>
          </div>
        </div>
      </header>

      <!-- Config warning banner (shown if keys missing) -->
      <div id="banner" class="banner hidden"></div>

      <!-- Conversation transcript -->
      <main id="messages" aria-live="polite"></main>

      <!-- Composer: a model-picker row above the input row -->
      <footer id="composer">
        <div class="composer-bar">
          <button id="modelPicker" class="model-trigger" title="Model & reasoning effort">
            <span id="modelPickerLabel">Model</span>
            <span class="caret">▾</span>
          </button>
        </div>
        <div class="composer-row">
          <button id="attach" class="icon-btn attach" title="Upload a 3D model (STL, 3MF, OBJ, STEP, or a ZIP of parts)">
            ＋
          </button>
          <textarea
            id="input"
            rows="1"
            placeholder="Ask, or drop an STL to slice…"
            autofocus
          ></textarea>
          <button id="send" title="Send (Enter)">↑</button>
          <button id="stop" class="hidden" title="Stop">■</button>
        </div>

        <!-- Model / effort popover (anchored above the composer) -->
        <div id="pickerPop" class="picker-pop hidden">
          <div class="set-group">
            <label class="set-label">Model</label>
            <div id="modelList" class="model-list"></div>
          </div>
          <div class="set-group">
            <label class="set-label">Reasoning effort</label>
            <div id="effortSeg" class="seg"></div>
            <p id="effortHint" class="set-hint"></p>
          </div>
        </div>
      </footer>

      <!-- Full-window drag-drop overlay -->
      <div id="dropzone" class="dropzone hidden">
        <div class="dz-inner">
          <span class="dz-ico">⬇</span>
          <span class="dz-text">Drop your 3D model</span>
          <span class="dz-sub">STL · 3MF · OBJ · AMF · STEP</span>
        </div>
      </div>
    </div>
    <script type="module" src="renderer.js"></script>
  </body>
</html>
