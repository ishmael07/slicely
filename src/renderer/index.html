<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' https: data:; style-src 'self' 'unsafe-inline'; script-src 'self';"
    />
    <title>Slicely</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <!-- Draggable title strip (frameless window) -->
      <header id="titlebar">
        <div class="brand">
          <span class="logo">◆</span>
          <span class="name">Slicely</span>
        </div>
        <div class="title-right">
          <div class="status" id="slicerStatus" title="PrusaSlicer status">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">checking…</span>
          </div>
          <button id="settingsBtn" class="icon-btn" title="Printer &amp; slicing settings">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.7"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Settings sheet (printer + slice defaults), slides down from the top -->
      <div id="settingsSheet" class="settings-sheet hidden">
        <div class="ss-row">
          <label class="ss-label" for="ssPrinter">Printer</label>
          <select id="ssPrinter" class="ss-control"></select>
        </div>
        <!-- Custom bed/nozzle inputs (shown only when Printer = Custom) -->
        <div id="ssCustom" class="ss-custom hidden">
          <div class="ss-custom-grid">
            <label>Bed X<input id="ssBedX" type="number" min="20" max="600" step="1" placeholder="mm" /></label>
            <label>Bed Y<input id="ssBedY" type="number" min="20" max="600" step="1" placeholder="mm" /></label>
            <label>Bed Z<input id="ssBedZ" type="number" min="20" max="600" step="1" placeholder="mm" /></label>
            <label>Nozzle<input id="ssNozzle" type="number" min="0.1" max="2" step="0.05" placeholder="mm" /></label>
          </div>
          <button id="ssSaveCustom" class="btn primary ss-save">Save custom printer</button>
        </div>
        <div class="ss-row">
          <label class="ss-label" for="ssMaterial">Material</label>
          <select id="ssMaterial" class="ss-control"></select>
        </div>
        <div class="ss-row">
          <label class="ss-label" for="ssGoal">Default goal</label>
          <select id="ssGoal" class="ss-control"></select>
        </div>
        <div class="ss-row">
          <label class="ss-label" for="ssInfill">Infill %</label>
          <input id="ssInfill" class="ss-control ss-num" type="number" min="0" max="100" step="1" placeholder="auto" />
        </div>
        <div class="ss-row">
          <label class="ss-label" for="ssPattern">Infill pattern</label>
          <select id="ssPattern" class="ss-control"></select>
        </div>
        <div class="ss-row">
          <span class="ss-label">Supports</span>
          <div class="ss-seg" id="ssSupports" role="group" aria-label="Supports"></div>
        </div>
        <div class="ss-row" id="ssStyleRow">
          <label class="ss-label" for="ssSupportStyle">Support style</label>
          <select id="ssSupportStyle" class="ss-control"></select>
        </div>
        <div class="ss-row">
          <span class="ss-label">Brim</span>
          <div class="ss-seg" id="ssBrim" role="group" aria-label="Brim"></div>
        </div>
        <p class="ss-hint">Saved for every slice — Slicely won't ask again. Set "auto" to let it decide from each model.</p>
      </div>

      <!-- Config warning banner (shown if keys missing) -->
      <div id="banner" class="banner hidden"></div>

      <!-- Conversation transcript -->
      <main id="messages" aria-live="polite"></main>

      <!-- Composer: two compact dropdowns above the input row -->
      <footer id="composer">
        <div class="composer-bar">
          <!-- Model dropdown -->
          <div class="picker-anchor">
            <button id="modelTrigger" class="picker-trigger" title="Model">
              <span class="dot"></span>
              <span id="modelTriggerLabel">Model</span>
              <span class="caret">▾</span>
            </button>
            <div id="modelMenu" class="picker-menu hidden"></div>
          </div>
          <!-- Effort dropdown (hidden for fixed-speed models) -->
          <div class="picker-anchor">
            <button id="effortTrigger" class="picker-trigger hidden" title="Reasoning effort">
              <span id="effortTriggerLabel">Effort</span>
              <span class="caret">▾</span>
            </button>
            <div id="effortMenu" class="picker-menu hidden"></div>
          </div>
        </div>
        <!-- Attachment tray: appears when files are staged (drop or picker) -->
        <div id="attachTray" class="attach-tray hidden"></div>
        <div class="composer-row">
          <button id="attach" class="icon-btn attach" title="Attach a 3D model (STL, 3MF, OBJ, STEP, or a ZIP of parts)">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" aria-hidden="true">
              <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
          <textarea
            id="input"
            rows="1"
            placeholder="Ask, or drop an STL to slice…"
            autofocus
          ></textarea>
          <button id="send" title="Send (Enter)" disabled>
            <svg viewBox="0 0 24 24" width="19" height="19" fill="none" aria-hidden="true">
              <path d="M12 19V6M12 6l-6 6M12 6l6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button id="stop" class="hidden" title="Stop">
            <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true">
              <rect x="6" y="6" width="12" height="12" rx="2.5" fill="currentColor"/>
            </svg>
          </button>
        </div>
      </footer>

      <!-- Full-window drag-drop overlay -->
      <div id="dropzone" class="dropzone hidden">
        <div class="dz-inner">
          <span class="dz-ico">⬇</span>
          <span class="dz-text">Drop your 3D model</span>
          <span class="dz-sub">STL · 3MF · OBJ · AMF · STEP</span>
        </div>
      </div>
    </div>
    <script type="module" src="renderer.js"></script>
  </body>
</html>
